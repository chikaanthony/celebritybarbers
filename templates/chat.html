<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Chat - Celebrity Barber</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <!-- Close Button -->
        <button class="close-btn" onclick="window.location.href='/clientdashboard'">✕</button>
        
        <!-- Chat Header -->
        <h1 class="chat-header">CHAT WITH ADMIN</h1>
        <hr class="header-separator">
        
        <!-- Direct Chat View -->
        <div class="chat-view" id="chatView" style="display: flex;">
            <div class="chat-view-header">
                <span class="chat-view-name" id="chatViewName">Celebrity Barber Admin</span>
                <span class="online-indicator" id="adminStatus" style="color: #666;">○ Offline</span>
            </div>
            
            <div class="user-status-bar">
                <span class="user-status-indicator" id="userStatus" style="color: #666;">○ Connecting...</span>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <!-- Welcome message -->
                <div class="message them">
                    <div class="message-bubble">
                        <p>Hello! Welcome to Celebrity Barber. How can we help you today?</p>
                        <span class="message-time">Now</span>
                    </div>
                </div>
            </div>
            
            <div class="message-input-area">
                <button type="button" class="voice-btn" id="voiceBtn" onclick="toggleVoiceRecording()" title="Hold to record voice note">
                    <span>🎤</span>
                </button>
                <input 
                    type="text" 
                    class="message-input" 
                    id="messageInput"
                    placeholder="Type a message..."
                    onkeypress="handleKeyPress(event)"
                >
                <button type="button" class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <span>✈️</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Voice Recording Indicator -->
    <div class="voice-recording-indicator" id="voiceRecordingIndicator" style="display: none;">
        <div class="recording-dot"></div>
        <span>Recording... <span id="recordingTime">0:00</span></span>
        <button type="button" class="stop-recording-btn" onclick="stopVoiceRecording()">⏹️</button>
    </div>
    
    <script>
        // Check admin online status
        async function checkAdminStatus() {
            try {
                const response = await fetch('/api/chat/admin-status');
                const result = await response.json();
                
                const statusEl = document.getElementById('adminStatus');
                if (statusEl) {
                    if (result.is_online) {
                        statusEl.textContent = '● Online';
                        statusEl.style.color = '#4CAF50';
                    } else {
                        statusEl.textContent = '○ Offline';
                        statusEl.style.color = '#666';
                    }
                }
                
                // Update user status (they are online since they're using the chat)
                const userStatusEl = document.getElementById('userStatus');
                if (userStatusEl) {
                    userStatusEl.textContent = '● You are online';
                    userStatusEl.style.color = '#4CAF50';
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
                const statusEl = document.getElementById('adminStatus');
                if (statusEl) {
                    statusEl.textContent = '○ Offline';
                    statusEl.style.color = '#666';
                }
            }
        }
        
        // Send heartbeat to keep user active
        async function sendHeartbeat() {
            try {
                await fetch('/api/user/heartbeat', { method: 'POST' });
            } catch (e) {}
        }
        
        // Load messages from API
        async function loadMessages() {
            try {
                const response = await fetch('/api/chat/messages');
                const result = await response.json();
                
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                
                if (result.success && result.data && result.data.length > 0) {
                    result.data.forEach(msg => {
                        const senderClass = msg.sender === 'user' ? 'me' : 'them';
                        const messageDiv = document.createElement('div');
                        messageDiv.className = `message ${senderClass}`;
                        
                        // Check if it's a voice message
                        let messageContent = '';
                        if (msg.message_type === 'voice' && msg.audio_url) {
                            messageContent = `
                                <div class="voice-message">
                                    <audio controls src="${msg.audio_url}"></audio>
                                </div>
                            `;
                        } else {
                            messageContent = `<p>${msg.message}</p>`;
                        }
                        
                        messageDiv.innerHTML = `
                            <div class="message-bubble">
                                ${messageContent}
                                <span class="message-time">${msg.display_time || msg.time || ''}</span>
                            </div>
                        `;
                        container.appendChild(messageDiv);
                    });
                } else {
                    // Show welcome message if no messages
                    container.innerHTML = `
                        <div class="message them">
                            <div class="message-bubble">
                                <p>Hello! Welcome to Celebrity Barber. How can we help you today?</p>
                                <span class="message-time">Now</span>
                            </div>
                        </div>
                    `;
                }
                
                // Scroll to bottom
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                console.error('Error loading messages:', error);
                // Show welcome message on error
                const container = document.getElementById('messagesContainer');
                container.innerHTML = `
                    <div class="message them">
                        <div class="message-bubble">
                            <p>Hello! Welcome to Celebrity Barber. How can we help you today?</p>
                            <span class="message-time">Now</span>
                        </div>
                    </div>
                `;
            }
        }
        
        // Mark chat as viewed when page loads
        async function markChatViewed() {
            try {
                await fetch('/api/chat/mark-viewed', { method: 'POST' });
            } catch (error) {
                console.error('Error marking chat as viewed:', error);
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) {
                alert('Please enter a message');
                return;
            }
            
            // Send to API
            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const result = await response.json();
                console.log('Send response:', result);
                
                if (result.success) {
                    // Clear input
                    input.value = '';
                    
                    // Reload messages
                    loadMessages();
                } else {
                    alert('Error: ' + (result.message || 'Failed to send message'));
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Error sending message. Please try again.');
            }
        }
        
        // Voice Recording Variables
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingTimer = null;
        let recordingSeconds = 0;
        
        // Voice Recording Functions
        async function toggleVoiceRecording() {
            if (isRecording) {
                stopVoiceRecording();
            } else {
                startVoiceRecording();
            }
        }
        
        async function startVoiceRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendVoiceNote(audioBlob);
                    
                    // Stop all tracks
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                
                // Show recording indicator
                document.getElementById('voiceRecordingIndicator').style.display = 'flex';
                document.getElementById('voiceBtn').classList.add('recording');
                
                // Start timer
                recordingSeconds = 0;
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60);
                    const secs = recordingSeconds % 60;
                    document.getElementById('recordingTime').textContent = 
                        `${mins}:${secs.toString().padStart(2, '0')}`;
                }, 1000);
                
            } catch (error) {
                console.error('Error starting voice recording:', error);
                alert('Could not access microphone. Please grant permission.');
            }
        }
        
        function stopVoiceRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                // Hide recording indicator
                document.getElementById('voiceRecordingIndicator').style.display = 'none';
                document.getElementById('voiceBtn').classList.remove('recording');
                
                // Clear timer
                if (recordingTimer) {
                    clearInterval(recordingTimer);
                    recordingTimer = null;
                }
            }
        }
        
        async function sendVoiceNote(audioBlob) {
            try {
                const formData = new FormData();
                formData.append('audio', audioBlob, 'voice-note.webm');
                
                const response = await fetch('/api/chat/voice', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if (result.success) {
                    loadMessages(); // Reload to show new message
                } else {
                    alert('Failed to send voice note');
                }
            } catch (error) {
                console.error('Error sending voice note:', error);
                alert('Failed to send voice note');
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Load messages on page load
        loadMessages();
        checkAdminStatus();
        sendHeartbeat();
        markChatViewed();
        
        // Refresh messages every 10 seconds
        setInterval(loadMessages, 10000);
        
        // Check admin status every 30 seconds
        setInterval(checkAdminStatus, 30000);
        
        // Send heartbeat every minute to keep user active
        setInterval(sendHeartbeat, 60000);

        // Fallback for browsers that do not resize content when keyboard opens
        (function setupKeyboardViewportFallback() {
            if (!window.visualViewport) {
                return;
            }

            const root = document.documentElement;
            const viewport = window.visualViewport;

            const updateKeyboardOffset = () => {
                const keyboardOffset = Math.max(
                    0,
                    window.innerHeight - viewport.height - viewport.offsetTop
                );
                root.style.setProperty('--keyboard-offset', `${keyboardOffset}px`);
            };

            viewport.addEventListener('resize', updateKeyboardOffset);
            viewport.addEventListener('scroll', updateKeyboardOffset);
            window.addEventListener('resize', updateKeyboardOffset);
            updateKeyboardOffset();
        })();
    </script>
</body>
</html>
